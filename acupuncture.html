---
layout: default
title: Acupuncture
---

<!-- Tab Menu: Generated from the Data File -->
<nav class="tab-menu">
  {% for item in site.data.acupuncture %}
    <button class="tab-link {% if forloop.first %}active{% endif %}" 
            onclick="openTab(event, '{{ item.id }}')">
      {{ item.title }}
    </button>
  {% endfor %}
</nav>

<!-- Tab Content: Generated from the Data File -->
<div class="tab-content-container">
  {% for item in site.data.acupuncture %}
    <div id="{{ item.id }}" class="tab-pane" style="display: {% if forloop.first %}block{% else %}none{% endif %};">
      <h2>{{ item.heading }}</h2>
      <p>{{ item.content | newline_to_br }}</p>
    </div>
  {% endfor %}
</div>
