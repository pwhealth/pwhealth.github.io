- id: "howitworks"
  title: "How it Works"
  heading: "What is Acupuncture"
  content: |
    Acupuncture involves stimulating points along meridians to balance the body, utilizing physical methods, heat, or needles. It is part of Chinese Medicine, which serves as a complementary therapy in the modern world. Treatments aim to unblock obstructions and restore bodily balance.

- id: "whatis"
  title: "What is it?"
  heading: "Traditional Healing"
  content: |
    Chinese medicine is a complete system rooted in ancient observation, viewing man as a microcosm connected to the universe. It utilizes yin-yang and five-phase theories, along with therapies like acupuncture, herbs, massage, and qigong to promote health and fight disease, as described in "Chinese Medical Theory Volume I - Fundamentals" by Kevin Juliano.

- id: "firstvisit"
  title: "First Visit"
  heading: "Preparation for your first Treatment"
  content: |
    Do not skip meals, and wear loose-fitting clothing with clean skin. Prepare for the treatment similarly to exercising.

- id: "pricing"
  title: "Pricing & Hours"
  heading: "Pricing and Hours"
  content: |
    Treatments are $55, with an extra $25 for the initial consultation. Insurance is not accepted to keep costs low, but receipts for reimbursement are provided. Hours are by appointment only (Mon/Thu: 1-6pm, Tue/Fri: 9:30am-2pm).

- id: "faq"
  title: "FAQ"
  heading: "Common Questions"
  content: |
    We use single-use, sterile, disposable needles with minimal discomfort. A series of 3-4 treatments is recommended for best results. Acupuncture is considered complementary, and you should always inform your primary physician.
