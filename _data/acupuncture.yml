- id: "whatisacu"
  title: "What is Acupuncture"
  heading: "What is Acupuncture"
  content: 'Acupuncture, involves the stimulation and balancing of the body through the use of acupuncture points which lie along communication pathways in the body called meridians. These points and meridians are manipulated through physical means, electrical impulses, heating with moxibustion, or the use of a needle. When most people here the word Acupuncture, they think of the small needles which are used.<br><br>Acupuncture is a part of Chinese Medicine, and works best when used according to the classical Chinese understanding of health and disease. As my teacher in Jinan China told me, "when prescribing western medicine use western medicine, when prescribing Chinese medicine, use Chinese medicine." In this way, we believe Acupuncture and Chinese medicine can best serve as complementary therapy in the modern world.<br><br>In the simplest sense, disorders in the body occur when there is blockage along the meridian, or if there is an insufficiency in the meridian. Treatment aimed at unblocking the obstruction and promoting movement, or supplementing the insufficiency can restore balance to the body. When the body is balanced, normal communication has been restored, and the body can continue to heal and strengthen itself.'

- id: "whatiscm"
  title: "What is Chinese Medicine?"
  heading: "Chinese Medicine"
  content: "Chinese medicine is a complete system of medicine with its own theories of normal physiology and disease pathology. These theories are part of the natural sciences of premodern China which evolved from generations of observation and recording of the changes around us. Over time, this system of medicine has developed a rich understanding of health and disease, and has developed its own methods to promote health along with methods to diagnose, prevent and treat disease.<br><br>One of the central tenants of Chinese natural science is that man and the world around him form an inseparable whole. Observing and understanding this natural law has allowed the development of an understanding that man himself forms a small, connected universe which mirrors, and is influenced by, the larger universe surrounding him.<br><br>Through observation of the natural environment, two basic theories about the nature of the world arose, yin yang theory 陰陽學說, and five phase theory五行學說. Both of these theories are a way to classify and categorize objects and events in the natural world. Additionally, both contain laws of movement, connection, and interaction within and among the categories. These two basic theories are part of a tradition in China of observing, recording, and contemplating the nature of the universe.<br><br>It is because of this rich tradition that the ancient Chinese discovered that the man's body mirrored the world around them. Through observation, these early scientists and observers discovered that everything in the world is interconnected, perpetually in motion, and always changing. They also discovered that the world does not move in a random and chaotic manner, but that the world moved according to patterns and cycles that exert a subtle influence on everything around us, and that there was nothing in this world, including man, which could escape from this influence.<br><br>It is these discoveries that form the basis for the traditional science, philosophies, and religions of ancient China including the philosophies of Daoism and Confucianism, and Chinese Buddhism. Chinese medicine is also part of this rich tradition, focusing on the health and well-being of man.<br><br>As part of a tradition which includes the accumulation of thousands of years of experience and understanding of the world, Chinese medicine has evolved into a unique medical system. This medical system is most readily recognized by its therapeutic methods, namely acupuncture and moxibustion針灸, Chinese herbal medicine方劑, Tuina 推拿 massage, qigong 氣功 breathing exercises and Chinese dietary therapy 食療. When applied skillfully, these therapeutic methods have proven to be quite powerful and effective in promoting health and fighting disease.<br><br>--adapted from Chinese Medical Theory Volume I - Fundamentals, by Kevin Juliano'"

- id: "firstvisit"
  title: "First Visit"
  heading: "Preparation for your first Treatment"
  content: |
    Please do not skip meals before treatment. Wear loose, comfortable clothing, such as clean tops and pants, that allow for easy access to arms and legs. Clean skin is required for compliance with Clean Needle Technique guidelines.

- id: "pricing"
  title: "Pricing & Hours"
  heading: "Pricing and Hours"
  content: |
    Treatment is $55, with an initial consultation fee of $25. We do not accept insurance, enabling us to keep prices low. Payment is accepted via cash, check, or credit card. We provide receipts for reimbursement. Hours are by appointment: Monday (1-6 PM), Tuesday (9:30 AM-2 PM), Thursday (1-6 PM), and Friday (9:30 AM-2 PM), with limited availability.

- id: "faq"
  title: "FAQ"
  heading: "Common Questions"
  content: |
    We use sterile, single-use, disposable needles. Most patients experience minimal discomfort. A series of treatments is typically recommended, with 3-4 sessions suggested to assess improvements. Inform your physician about any treatment, as acupuncture is considered complementary medicine. Contact us with any questions.
